# Prod-preview server: the SPA at the root, /api same-origin to Symfony. HTTPS is
# not optional locally — the __Host-oauth_flow cookie is Secure and Safari grants
# http://localhost no leniency (same reasoning as the backend nginx).
server {
    listen 80;
    return 301 https://localhost:8444$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    root /usr/share/nginx/html;

    # Match the backend nginx so OPML imports aren't cut off at nginx's 1m default.
    client_max_body_size 10m;

    # The API. The php container mounts ./backend at /app, so the front controller
    # is always /app/public/index.php inside php-fpm regardless of THIS nginx's
    # root — hence the hardcoded SCRIPT_FILENAME (no rewrite happens here, so
    # $fastcgi_script_name would be /api/... and is not usable). Symfony routes on
    # REQUEST_URI (supplied by fastcgi_params).
    location /api/ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /app/public;
        fastcgi_param HTTPS on;
    }

    # SPA client-side routes: fall back to index.html for anything not a real file.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
