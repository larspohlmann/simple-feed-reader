<section>
  <h2>{{ 'settings.account.title' | transloco }}</h2>
  @if (auth.user(); as u) {
    <dl class="grid">
      <dt>{{ 'settings.account.email' | transloco }}</dt>
      <dd>{{ u.email }}</dd>
      <dt>{{ 'settings.account.memberSince' | transloco }}</dt>
      <dd>{{ u.createdAt | date: 'longDate' }}</dd>
    </dl>
    @if (auth.isAdmin()) {
      <a class="admin" routerLink="/admin/users">
        <app-icon name="shield_person" [size]="18" />
        {{ 'settings.account.adminQueue' | transloco }}
      </a>
    }
    <button class="signout" (click)="auth.logout()">
      {{ 'settings.account.signOut' | transloco }}
    </button>
  }
</section>
