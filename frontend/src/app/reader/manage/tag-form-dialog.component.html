<div
  class="dialog"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="titleKey | transloco"
  cdkTrapFocus
>
  <h2>{{ titleKey | transloco }}</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label class="lbl" for="tag-name">{{ 'dialog.tagForm.name' | transloco }}</label>
    <input id="tag-name" class="field" formControlName="name" maxlength="100" cdkFocusInitial />

    <p class="lbl">{{ 'dialog.tagForm.colour' | transloco }}</p>
    <div class="swatches">
      @for (c of colors; track c) {
        <button
          type="button"
          class="swatch"
          [class.on]="color() === c"
          [style.background]="c"
          [attr.aria-label]="'dialog.tagForm.colourAria' | transloco: { colour: c }"
          (click)="color.set(c)"
        ></button>
      }
      <input
        type="color"
        class="picker"
        [attr.aria-label]="'dialog.tagForm.customColour' | transloco"
        [value]="color() ?? '#3f8676'"
        (input)="color.set(pickerValue($event))"
      />
      <button type="button" class="clear" (click)="color.set(null)">
        {{ 'dialog.tagForm.none' | transloco }}
      </button>
    </div>

    <p class="lbl">{{ 'dialog.tagForm.icon' | transloco }}</p>
    <div class="icons">
      <button
        type="button"
        class="icon"
        [class.on]="icon() === null"
        [attr.aria-label]="'dialog.tagForm.noIcon' | transloco"
        (click)="icon.set(null)"
      >
        <app-icon name="block" [size]="18" />
      </button>
      @for (i of icons; track i) {
        <button
          type="button"
          class="icon"
          [class.on]="icon() === i"
          [attr.aria-label]="i"
          (click)="icon.set(i)"
        >
          <app-icon [name]="i" [size]="18" />
        </button>
      }
    </div>

    @if (error()) {
      <p class="error" role="alert">{{ error() }}</p>
    }
    <div class="row">
      <button type="button" (click)="ref.close()">{{ 'dialog.cancel' | transloco }}</button>
      <button type="submit" class="primary" [disabled]="loading()">
        {{ (loading() ? 'dialog.tagForm.saving' : 'dialog.tagForm.save') | transloco }}
      </button>
    </div>
  </form>
</div>
