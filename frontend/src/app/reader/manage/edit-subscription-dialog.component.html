<div class="dialog" role="dialog" aria-modal="true" aria-label="Edit feed" cdkTrapFocus>
  <h2>Edit feed</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label class="lbl" for="sub-title">Custom title</label>
    <input
      id="sub-title"
      class="field"
      formControlName="customTitle"
      maxlength="512"
      [placeholder]="data.title"
      cdkFocusInitial
    />

    <p class="lbl">Tags</p>
    @if (tagsStore.tags().length === 0) {
      <p class="hint">No tags yet — create one from Settings › Tags.</p>
    }
    <div class="tags">
      @for (t of tagsStore.tags(); track t.id) {
        <button
          type="button"
          class="tag-pill"
          [class.on]="checked().has(t.id)"
          [attr.aria-pressed]="checked().has(t.id)"
          (click)="toggle(t.id)"
        >
          @if (t.icon) {
            <app-icon
              [name]="t.icon"
              [size]="14"
              [style.color]="
                checked().has(t.id) ? 'var(--on-accent)' : t.color || 'var(--text-muted)'
              "
            />
          } @else {
            <span
              class="dot"
              [style.background]="
                checked().has(t.id) ? 'var(--on-accent)' : t.color || 'var(--text-muted)'
              "
            ></span>
          }
          {{ t.name }}
        </button>
      }
    </div>

    @if (error()) {
      <p class="error" role="alert">{{ error() }}</p>
    }
    <div class="row">
      <button type="button" (click)="ref.close()">Cancel</button>
      <button type="submit" class="primary" [disabled]="loading()">
        {{ loading() ? 'Saving…' : 'Save' }}
      </button>
    </div>
  </form>
</div>
