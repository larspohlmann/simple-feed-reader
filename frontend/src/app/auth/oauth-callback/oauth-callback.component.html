<app-auth-shell [title]="'auth.oauth.title' | transloco">
  @switch (state()) {
    @case ('loading') {
      <app-spinner />
    }
    @case ('error') {
      <p class="err">{{ 'auth.oauth.error' | transloco }}</p>
      <a routerLink="/login">{{ 'auth.backToSignIn' | transloco }}</a>
    }
  }
</app-auth-shell>
