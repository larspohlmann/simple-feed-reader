<app-auth-shell
  [title]="'auth.reset.requestTitle' | transloco"
  [subtitle]="'auth.reset.requestSubtitle' | transloco"
>
  @if (done()) {
    <p class="ok">{{ 'auth.reset.requestDone' | transloco }}</p>
    <a routerLink="/login">{{ 'auth.backToSignIn' | transloco }}</a>
  } @else {
    <form (ngSubmit)="submit()" [formGroup]="form">
      <label class="field">
        <span>{{ 'auth.email' | transloco }}</span>
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      <app-button type="submit" variant="primary" [loading]="loading()">{{
        'auth.reset.sendLink' | transloco
      }}</app-button>
    </form>
    <p class="links">
      <a routerLink="/login">{{ 'auth.backToSignIn' | transloco }}</a>
    </p>
  }
</app-auth-shell>
