<app-auth-shell
  [title]="'auth.login.title' | transloco"
  [subtitle]="'auth.login.subtitle' | transloco"
>
  <form [formGroup]="form">
    <label class="field">
      <span>{{ 'auth.email' | transloco }}</span>
      <input type="email" formControlName="email" name="email" autocomplete="email" />
    </label>
    <label class="field">
      <span>{{ 'auth.password' | transloco }}</span>
      <input
        type="password"
        formControlName="password"
        name="password"
        autocomplete="current-password"
      />
    </label>
    <app-form-error [message]="error()" />
    <app-button variant="primary" [loading]="loading()" (click)="submit()">{{
      'auth.login.submit' | transloco
    }}</app-button>
  </form>

  @if (providers().length) {
    <div class="divider">
      <span>{{ 'auth.login.or' | transloco }}</span>
    </div>
    @for (p of providers(); track p) {
      <button class="oauth" type="button" (click)="startOAuth(p)">
        {{ 'auth.login.continueWith' | transloco: { provider: label(p) } }}
      </button>
    }
  }

  <p class="links">
    <a routerLink="/register">{{ 'auth.login.createAccount' | transloco }}</a>
    <a routerLink="/reset-password-request">{{ 'auth.login.forgotPassword' | transloco }}</a>
  </p>
</app-auth-shell>
