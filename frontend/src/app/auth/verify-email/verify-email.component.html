<app-auth-shell [title]="'auth.verify.title' | transloco">
  @switch (state()) {
    @case ('loading') {
      <app-spinner />
    }
    @case ('ok') {
      <p>{{ 'auth.verify.ok' | transloco }}</p>
      <a routerLink="/login">{{ 'auth.backToSignIn' | transloco }}</a>
    }
    @case ('error') {
      <p class="err">{{ 'auth.verify.invalid' | transloco }}</p>
      <a routerLink="/login">{{ 'auth.backToSignIn' | transloco }}</a>
    }
  }
</app-auth-shell>
