<app-auth-shell
  [title]="'auth.register.title' | transloco"
  [subtitle]="'auth.register.subtitle' | transloco"
>
  @if (done()) {
    <p class="ok">{{ 'auth.register.done' | transloco }}</p>
    <a routerLink="/login">{{ 'auth.backToSignIn' | transloco }}</a>
  } @else {
    <form (ngSubmit)="submit()" [formGroup]="form">
      <label class="field">
        <span>{{ 'auth.email' | transloco }}</span>
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      <label class="field">
        <span>{{ 'auth.register.passwordLabel' | transloco }}</span>
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>
      <app-form-error [message]="error()" />
      <app-button type="submit" variant="primary" [loading]="loading()">{{
        'auth.register.submit' | transloco
      }}</app-button>
    </form>
    <p class="links">
      <a routerLink="/login">{{ 'auth.register.haveAccount' | transloco }}</a>
    </p>
  }
</app-auth-shell>
