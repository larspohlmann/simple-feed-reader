services:
    # Functional tests swap the real fetcher for a stub via
    # `self::getContainer()->set(...)`, which the container only allows on
    # public services. Test environment only — production keeps them private.
    App\Service\Fetch\FeedFetcherInterface:
        alias: App\Service\Fetch\HttpFeedFetcher
        public: true

    # The reader-endpoint test swaps a fake extractor via
    # `self::getContainer()->set(...)` so no outbound page fetch happens; the
    # container only permits that on a public service. Test environment only.
    App\Service\Reader\ArticleExtractorInterface:
        alias: App\Service\Reader\ArticleExtractor
        public: true

    # Tests acquire the refresh lock up front to assert the "busy" path.
    Symfony\Component\Lock\LockFactory:
        alias: lock.default.factory
        public: true

    # login_throttling counts attempts in a FILESYSTEM cache pool, which
    # survives both the kernel reboot between requests and the end of the test
    # run. Without clearing it, the per-IP global limiter (5 x max_attempts)
    # fills up with every login test ever executed and the suite starts
    # returning 429 for everything. Tests clear this between cases.
    test.cache.rate_limiter:
        alias: cache.rate_limiter
        public: true

    # UserFactory hashes passwords when seeding fixtures. No application code
    # injects the hasher yet (registration arrives in a later task), so the
    # compiler removes it entirely and the test container cannot fetch it.
    # Test environment only.
    Symfony\Component\PasswordHasher\Hasher\UserPasswordHasherInterface:
        alias: security.user_password_hasher
        public: true

    # Functional tests for registration, verification and password reset need to
    # mint or inspect a real token, because the plaintext value only ever exists
    # inside the email the service hands back. Test environment only.
    #
    # `autowire` is not redundant: naming the class here *replaces* the
    # definition produced by the App\ resource in services.yaml rather than
    # amending it, and this file has no _defaults to inherit from, so without it
    # the service is built with zero constructor arguments and blows up on first
    # fetch instead of at compile time.
    App\Service\Auth\ActionTokenService:
        autowire: true
        public: true

    # Registration and password-reset tests must build a *solved* ALTCHA payload,
    # which means issuing a real challenge from the same service the controller
    # verifies against. Same `autowire` caveat as above. Test environment only.
    App\Service\Auth\AltchaService:
        autowire: true
        public: true

    # Registration tests assert on rows and statuses the service wrote, and the
    # concurrency test drives register() directly to reproduce a race the HTTP
    # client cannot stage. Same `autowire` caveat as above. Test environment only.
    App\Service\Auth\RegistrationService:
        autowire: true
        public: true

    # The replay guard is a FILESYSTEM pool, so spent-solution markers outlive
    # the test run. Entries are keyed by a signature derived from 12 random
    # bytes, so a stale marker can never collide with a fresh challenge and the
    # rate-limiter's cross-run bleed problem does not arise here. Exposed anyway
    # so a test that wants a guaranteed-clean pool can clear it.
    App\Security\PasswordWorkEqualizer:
        autowire: true
        public: true

    App\Service\Mail\DeferredMailer:
        autowire: true
        public: true

    test.cache.altcha_replay:
        alias: altcha.replay.cache
        public: true

    # The OAuth flow tests must mint and inspect state and login codes, whose
    # plaintext values exist only inside a redirect URL, and must swap a real
    # provider for a fake via `self::getContainer()->set(...)`, which the
    # container only allows on public services.
    #
    # Only list an `App\Service\OAuth\*` class here once its file exists. Naming
    # a class that does not compiles fine (`cache:clear` stays green) and then
    # fails `lint:container` with "class does not exist" — or, worse, fails
    # confusingly on first fetch.
    #
    # `autowire: true` on each is not redundant — same caveat as the entries
    # above: naming a class here REPLACES the definition the App\ resource
    # produced rather than amending it, and this file has no _defaults to
    # inherit from, so without it the service is built with zero constructor
    # arguments.

    # Records the SQL each request actually executed, so "the admin list reads
    # every user's providers in ONE query" is counted rather than eyeballed. An
    # N+1 produces a byte-identical response, so nothing asserted on the body
    # can ever fail when somebody replaces the batched lookup with a loop.
    #
    # Tagged explicitly rather than relying on autoconfiguration: `tests/` is
    # not in the `App\` resource that services.yaml registers, so nothing here
    # is autoconfigured. Priority is left at the default, which puts it inside
    # dama/doctrine-test-bundle's StaticDriver — it therefore sees the real
    # statements and not the wrapping transaction's bookkeeping.
    App\Tests\Support\QueryRecorder:
        public: true
        tags:
            - { name: doctrine.middleware }

    test.cache.oauth_state:
        alias: oauth.state.cache
        public: true

    # The flow tests drive start() to obtain a state they can replay into the
    # callback, and consume() to assert the callback burned it. Neither value
    # exists anywhere a test could otherwise reach: the state lives only in a
    # redirect URL and the verifier never leaves the server at all.
    App\Service\OAuth\OAuthStateStore:
        autowire: true
        public: true

    test.cache.oauth_login_code:
        alias: oauth.login_code.cache
        public: true

    # The flow tests read the code out of the callback's redirect and trade it
    # for a JWT, and assert a second exchange fails. The plaintext code exists
    # only in that redirect URL, so there is no other seam to reach it from.
    App\Service\OAuth\LoginCodeStore:
        autowire: true
        public: true

    # The flow tests assert which account a callback landed on — linked, claimed
    # or freshly created — and the linking rules are easier to drive directly
    # than through a full provider round trip. Same `autowire` caveat as above.
    App\Service\OAuth\OAuthAccountLinker:
        autowire: true
        public: true

    # HtmlItemExtractorWiringTest fetches this to prove the app.scrape_layer
    # tagged iterator actually collects the extraction layers in priority
    # order — an empty iterator builds fine and only fails on first use.
    # Several service tests also borrow the container-built extractor instead
    # of assembling the layer stack by hand. Same `autowire` caveat as above.
    App\Service\Scraper\HtmlItemExtractor:
        autowire: true
        public: true

    # FeedBodyParserWiringTest fetches this to prove the app.feed_body_parser
    # keyed locator actually collects both format parsers — an empty locator
    # builds fine and every refresh would then take the xml fallback, which
    # looks exactly like a working deployment until a scraped feed errors.
    # RefreshRunner is its only injection point, so without this entry the
    # compiler would inline it away and the test container could not fetch
    # it. Same `autowire` caveat as above.
    App\Service\Refresh\FeedBodyParser:
        autowire: true
        public: true

    # The flow tests resolve a provider by URL segment, and OAuthProviderWiring
    # Test fetches this to prove the container's tagged iterator actually finds
    # the providers — an empty one would build a registry that offers nothing
    # and looks exactly like a deployment with no credentials.
    #
    # Public is also what lets OAuthFlowTest replace the whole registry with one
    # holding a fake provider, in a single `self::getContainer()->set()` — the
    # seam that keeps the flow tests off the network without depending on
    # whether the container's tagged iterator has collected anything yet.
    App\Service\OAuth\OAuthProviderRegistry:
        autowire: true
        public: true
