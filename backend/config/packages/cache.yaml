framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # The "app" cache stores to the filesystem by default.
        # The data in this cache should persist between deploys.
        # Other options include:

        # Redis
        #app: cache.adapter.redis
        #default_redis_provider: redis://localhost

        # APCu (not recommended with heavy random-write workloads as memory fragmentation can cause perf issues)
        #app: cache.adapter.apcu

        # Namespaced pools use the above "app" backend by default
        pools:
            # Remembers spent ALTCHA solutions so one proof-of-work cannot
            # authorise more than one request. Lifetime deliberately exceeds the
            # challenge's own validity window so an entry never expires while
            # the challenge it guards is still acceptable.
            altcha.replay.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 4200

            # Flow state between our 302 to the provider and the provider's
            # callback. Filesystem, not a session: the API is stateless and
            # Apple's form_post callback is a cross-site POST that would not
            # carry a SameSite=Lax session cookie anyway.
            oauth.state.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 600

            # One-time login codes. 30 s is the spec's TTL; the pool's default
            # is a backstop for entries whose explicit expiry was somehow lost.
            oauth.login_code.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 60
