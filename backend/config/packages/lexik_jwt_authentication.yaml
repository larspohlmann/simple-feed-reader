lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    # 7 days. No refresh tokens: the Doctrine provider reloads the user on
    # every request, so revocation is immediate regardless of token lifetime.
    token_ttl: 604800
