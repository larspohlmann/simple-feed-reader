# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            Psr\Cache\CacheItemPoolInterface $altchaReplayCache: '@altcha.replay.cache'
            Psr\Cache\CacheItemPoolInterface $oauthStateCache: '@oauth.state.cache'
            Psr\Cache\CacheItemPoolInterface $loginCodeCache: '@oauth.login_code.cache'

    # Tags every OAuth provider so OAuthProviderRegistry's #[AutowireIterator]
    # can collect them.
    #
    # This is NOT redundant with `autoconfigure: true`. Autoconfiguration
    # registers an interface-named tag only for interfaces some bundle has
    # declared as an autoconfigured tag; a plain application interface gets
    # nothing, so `#[AutowireIterator(OAuthProviderInterface::class)]` on its
    # own resolves to an EMPTY iterator. It fails silently, too: the registry
    # builds, every lookup throws UnknownProviderException, and the result is
    # indistinguishable from a correctly wired deployment holding no
    # credentials. Verified by booting the test kernel and reading the
    # registry's collected providers — [] before this block, both providers
    # after. OAuthProviderWiringTest keeps it that way.
    _instanceof:
        App\Service\OAuth\OAuthProviderInterface:
            tags: ['app.oauth_provider']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\Service\Fetch\DnsResolverInterface: '@App\Service\Fetch\NativeDnsResolver'
    App\Service\Fetch\FeedFetcherInterface: '@App\Service\Fetch\HttpFeedFetcher'

    # Account mail is queued and sent on kernel.terminate, after the response
    # has been flushed — see App\Service\Mail\DeferredMailer for why that is a
    # security property and not just a latency win.
    #
    # Bound here rather than by decorating `mailer.mailer`, so the indirection
    # is visible at the one call site it applies to and AccountMailer keeps
    # depending on the plain MailerInterface (its unit test injects its own).
    # DeferredMailer itself autowires the real mailer, so there is no cycle.
    App\Service\Mail\AccountMailer:
        arguments:
            $mailer: '@App\Service\Mail\DeferredMailer'

    # Wraps the throttle limiter the `login` firewall's login_throttling block
    # generates, so the bucket key sees the same normalised address the user
    # provider resolves. See App\Security\NormalizedLoginRateLimiter for the
    # bypass this closes.
    #
    # DECORATION, not a `limiter:` service id in security.yaml. Naming a custom
    # limiter there makes LoginThrottlingFactory skip registering the global and
    # local RateLimiterFactory pair entirely, which would mean restating
    # max_attempts, the interval, the 5x global multiplier and the cache pool by
    # hand — four numbers to drift from the ones security.yaml already declares.
    # Decorating leaves all of that where it belongs and replaces only the key.
    #
    # The service id is generated as `security.login_throttling.<firewall>.limiter`.
    # If the firewall is ever renamed, the container fails at build time with an
    # unknown-decoration-target error rather than silently dropping the fix.
    App\Security\NormalizedLoginRateLimiter:
        decorates: security.login_throttling.login.limiter
        arguments:
            $inner: '@.inner'
