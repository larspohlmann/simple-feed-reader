# Local development stack. Additive to the native workflow: nothing in here
# modifies committed .env files — container-only environment variables override
# them via Symfony's env precedence. Spec:
# docs/superpowers/specs/2026-07-22-local-docker-design.md

# Pin the project name so container/volume identity does not depend on the
# checkout location (a worktree directory would otherwise derive e.g. "docker").
name: simple-feed-reader

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feedreader
      MYSQL_USER: feedreader
      MYSQL_PASSWORD: feedreader
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Non-standard host port so a natively installed MySQL never collides.
      - "127.0.0.1:33306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  php:
    build: ./docker/php
    volumes:
      - ./backend:/app
    environment:
      # Real env vars beat .env/.env.test file values (Symfony precedence), so
      # committed files stay untouched and the native SQLite workflow is
      # unaffected. In the test env Doctrine's dbname_suffix appends '_test',
      # so this one URL also points phpunit at feedreader_test.
      DATABASE_URL: "mysql://feedreader:feedreader@mysql:3306/feedreader?serverVersion=8.4&charset=utf8mb4"
      MAILER_DSN: "smtp://mailpit:1025"
    extra_hosts:
      # Makes host.docker.internal work on Docker Engine variants where it is
      # not built in; harmless on Docker Desktop.
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./backend:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    depends_on:
      - php

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"   # web inbox; SMTP (1025) stays internal to the compose network

  # Default dev frontend: the Angular CLI dev server with live reload. The
  # browser (on the host) fetches the bundle from here on :4200 and calls the
  # API at https://localhost:8443 directly — cross-origin, which the backend
  # CORS already allows (APP_FRONTEND_URL). So this container never talks to the
  # backend containers; it only serves the app. http://localhost is a secure
  # context, so crypto.subtle (ALTCHA) works without TLS here.
  frontend:
    image: node:22-slim
    working_dir: /app
    # First run installs Linux deps into the named volume — the host's macOS
    # node_modules can't be reused (esbuild ships a platform-specific binary).
    # Subsequent ups find node_modules already there and boot straight into the
    # dev server. --poll makes file-watching work across the bind mount on macOS.
    # npm is pinned to 11 (node:22 ships 10.9.8) because the lockfile was authored
    # by npm 11; npm 10 mis-resolves a transitive dep (chokidar) and rejects it.
    command:
      - sh
      - -c
      - '[ -x node_modules/.bin/ng ] || { npm i -g npm@11 --silent && npm ci --no-audit --no-fund; }; exec node_modules/.bin/ng serve --host 0.0.0.0 --port 4200 --poll 2000 --allowed-hosts --proxy-config proxy.conf.json'
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "4200:4200"

  # Opt-in prod preview (`docker compose --profile prod up`): the production
  # bundle served same-origin behind nginx, with /api proxied to Symfony. No
  # CORS (apiBaseUrl is '' in the prod build). OAuth end-to-end still redirects
  # to APP_FRONTEND_URL (:4200) — override that env if you need OAuth on :8444.
  frontend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    volumes:
      - ./docker/certs:/etc/nginx/certs:ro
    ports:
      - "127.0.0.1:8444:443"
    depends_on:
      - php

volumes:
  mysql-data:
  frontend-node-modules:
